name: DevOps Agent POC — Deploy

on:
  push:
    branches:
      - main

# ── What changed? Drive selective jobs ──────────────────────────────
jobs:

  # ── Job 1: Detect which files changed ─────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      infra_changed: ${{ steps.filter.outputs.infra }}
      app_changed:   ${{ steps.filter.outputs.app }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - '**.tf'
              - 'ec2/userdata.sh'
            app:
              - 'app/app.js'

  # ── Job 2: Terraform (runs if .tf or userdata.sh changed) ──────────
  terraform-infra:
    name: Terraform — Infrastructure
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra_changed == 'true'

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    us-east-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="ami_id=${{ secrets.TF_VAR_AMI_ID }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Capture Outputs
        id: tf_outputs
        run: |
          echo "ec2_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

      - name: Show EC2 IP
        run: echo "✅ EC2 Public IP -> ${{ steps.tf_outputs.outputs.ec2_ip }}"

  # ── Job 3: Deploy App (runs if app.js changed) ─────────────────────
  deploy-app:
    name: Deploy App — app.js
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true'

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    us-east-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set deployment metadata
        id: meta
        run: |
          echo "version=v1.0.${{ github.run_number }}"     >> $GITHUB_OUTPUT
          echo "commit=${{ github.sha }}"                  >> $GITHUB_OUTPUT
          echo "deployed_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "deployed_by=github-actions"                >> $GITHUB_OUTPUT

      - name: Deploy app.js via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cp /app/app.js /app/app.js.bak",
              "cat > /app/app.js << APPEOF",
              "'"$(cat app/app.js | sed 's/\"/\\\"/g')"'",
              "APPEOF",
              "export APP_VERSION=\"v1.0.${{ github.run_number }}\"",
              "export DEPLOYED_BY=\"github-actions\"",
              "export DEPLOYED_AT=\"${{ steps.meta.outputs.deployed_at }}\"",
              "export GIT_COMMIT=\"${{ github.sha }}\"",
              "export ENVIRONMENT=\"dev\"",
              "pkill -f \"node /app/app.js\" || true",
              "sleep 2",
              "nohup env APP_VERSION=\"v1.0.${{ github.run_number }}\" DEPLOYED_BY=\"github-actions\" DEPLOYED_AT=\"${{ steps.meta.outputs.deployed_at }}\" GIT_COMMIT=\"${{ github.sha }}\" ENVIRONMENT=\"dev\" node /app/app.js > /var/log/app.log 2>&1 &",
              "sleep 3",
              "curl -s http://localhost:3000/health"
            ]' \
            --region us-east-1 \
            --output text \
            --query "Command.CommandId" > /tmp/ssm_command_id.txt

          echo "SSM Command ID: $(cat /tmp/ssm_command_id.txt)"

      - name: Wait for SSM command to complete
        run: |
          COMMAND_ID=$(cat /tmp/ssm_command_id.txt)
          echo "Waiting for command $COMMAND_ID to complete..."

          for i in {1..12}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "Attempt $i/12 — Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "✅ Deployment succeeded"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "❌ Deployment failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --region us-east-1 \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            sleep 10
          done

      - name: Verify deployment via health check
        run: |
          EC2_IP="${{ secrets.EC2_PUBLIC_IP }}"
          echo "Checking http://${EC2_IP}:3000/health"

          for i in {1..5}; do
            RESPONSE=$(curl -s --max-time 10 http://${EC2_IP}:3000/health || echo "failed")
            echo "Health check attempt $i: $RESPONSE"

            if echo "$RESPONSE" | grep -q "healthy"; then
              VERSION=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','unknown'))")
              echo "✅ App is healthy — version: $VERSION"
              break
            fi
            sleep 5
          done

      - name: Print deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ DEPLOYMENT COMPLETE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Version    : v1.0.${{ github.run_number }}"
          echo "  Commit     : ${{ github.sha }}"
          echo "  Deployed At: ${{ steps.meta.outputs.deployed_at }}"
          echo "  Deployed By: github-actions"
          echo "  Instance   : ${{ secrets.EC2_INSTANCE_ID }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ── Job 4: Verify (always runs after both jobs) ────────────────────
  verify:
    name: Verify — Final Health Check
    runs-on: ubuntu-latest
    needs: [terraform-infra, deploy-app]
    if: always() && (needs.terraform-infra.result == 'success' || needs.deploy-app.result == 'success')

    steps:
      - name: Final health check
        run: |
          EC2_IP="${{ secrets.EC2_PUBLIC_IP }}"
          echo "🔍 Final verification against http://${EC2_IP}:3000/health"

          RESPONSE=$(curl -s --max-time 15 http://${EC2_IP}:3000/health || echo "unreachable")
          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | grep -q "healthy"; then
            echo "✅ All systems healthy — POC deployment verified!"
          else
            echo "⚠️  Health check inconclusive — check manually"
          fi
